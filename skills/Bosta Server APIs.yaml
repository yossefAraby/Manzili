        access:
          $ref: '#/components/schemas/GroupAccess'
    GroupAccess:
      title: GroupAccess
      required:
        - resource
        - permission
        - scope
      type: object
      properties:
        resource:
          type: string
        permission:
          $ref: '#/components/schemas/Permission'
        scope:
          $ref: '#/components/schemas/Scope'
      example:
        resource: DELIVERY
        permission:
          READ: true
          EDIT: true
          WRITE: true
          DELETE: true
        scope:
          READ_MANY: true
          EDIT_MANY: true
          WRITE_MANY: true
          DELETE_MANY: false
    Permission:
      title: Permission
      required:
        - READ
        - EDIT
        - WRITE
        - DELETE
      type: object
      properties:
        READ:
          type: boolean
        EDIT:
          type: boolean
        WRITE:
          type: boolean
        DELETE:
          type: boolean
      example:
        READ: true
        EDIT: true
        WRITE: true
        DELETE: true
    Scope:
      title: Permission
      required:
        - READ_MANY
        - EDIT_MANY
        - WRITE_MANY
        - DELETE_MANY
      type: object
      properties:
        READ_MANY:
          type: boolean
        EDIT_MANY:
          type: boolean
        WRITE_MANY:
          type: boolean
        DELETE_MANY:
          type: boolean
      example:
        READ_MANY: true
        EDIT_MANY: true
        WRITE_MANY: true
        DELETE_MANY: false
    JoinBusinessUser:
