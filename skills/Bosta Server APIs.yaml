                        type: string
                        example: '1'
                      floor:
                        type: string
                        example: '2'
                      apartment:
                        type: string
                        example: '3'
                      secondLine:
                        type: string
                        example: 'Your address second line details like landmarks'

      responses:
        '200':
          description: Ok
          headers: {}
          content:
            application/json:
              example:
