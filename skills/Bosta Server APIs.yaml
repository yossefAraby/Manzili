  /users/forget-password:
    post:
      tags:
        - Users
      summary: User forget password
      description: Request payload used to initiate the password reset process.
      operationId: Userforgetpassword
      parameters: []
      requestBody:
        description: |
          * email: the user mail
           * source: the user source, Value is either 1 for Business Dashboard and 2 for Admin Dashboard
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserforgetpasswordRequest'
            example:
              email: admin@business.com
              source: '1'
        required: true
      responses:
        '200':
          description: Ok
          headers: {}
          content:
            application/json:
              schema :
                  type: object
                  properties:
                    success:
                      type: boolean
                      description: Indicates whether the password reset request was processed successfully.
                      example: true
                    message:
                      type: string
                      description: Informational message returned after processing the request.
                      example: Reset link sent to your mail.
                    data:
                      nullable: true
                      description: No additional data is returned for this operation.
                      example: null
        '400':
          description: Bad request
        '401':
          description: UnAuthorized
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: User is not authorized!
                errorCode: 1007
                data: null
        '403':
          description: Forbidden
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Access to the requested resource is forbidden
                errorCode: 1008
                data: null
        '500':
          description: Internal Server Error
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Internal Server Error
                errorCode: 1000
                data: null
      security: []
      deprecated: false
  /users/{token}/reset:
    put:
      tags:
        - Users
      summary: Reset user password
      description: Request payload used to finish the password reset process.
      operationId: resetPassword
      parameters:
        - name: token
          in: path
          description: Password reset token received via email.
          required: true
          style: simple
          schema:
            type: string
      requestBody:
        required: true
        description: |
          Payload used to reset the user's password.
  
          **Password requirements:**
          - Minimum 8 characters
          - At least one uppercase letter
          - At least one lowercase letter
          - At least one number
          - At least one special character
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            example:
              password: "Abcd1234@"
      responses:
        '200':
          description: Ok
          headers: {}
          content:
            application/json:
              schema :
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates whether the password reset request was processed successfully.
                    example: true
                  message:
                    type: string
                    description: Informational message returned after processing the request.
                    example: Password has been changed successfully.
                  data:
                    nullable: true
                    description: No additional data is returned for this operation.
                    example: null
        '400':
          description: Bad request
        '401':
          description: UnAuthorized
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: User is not authorized!
                errorCode: 1007
                data: null
        '403':
          description: Forbidden
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Access to the requested resource is forbidden
                errorCode: 1008
                data: null
        '500':
          description: Internal Server Error
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Internal Server Error
                errorCode: 1000
                data: null
      security: []
      deprecated: false
  /users/refresh-token:
    post:
      tags:
        - Users
      summary: Refresh token
      description: |
        Generate a new authentication token using a valid refresh token.
        This endpoint allows users to obtain a new access token without
