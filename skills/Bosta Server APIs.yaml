              type: string
              description: The first name of the user.
              example: John
            lastName:
              type: string
              description: The last name of the user.
              example: Doe
            phone:
              type: string
              description: The primary phone number of the user.
              example: '+201000000000'
            jobTitle:
              type: string
              description: The job title or role of the user within the business.
              example: OWNER
        group:
          type: object
          description: The permission group assigned to the user.
          properties:
            _id:
              type: string
              description: The unique identifier of the group.
              example: XaqlCFA
            name:
              type: string
              description: The name of the permission group.
              example: BUSINESS_FULL_ACCESS
            code:
              type: integer
              description: The numeric code representing the permission group.
              example: 115
        state:
          type: object
          description: The current account state of the user.
          properties:
            code:
              type: integer
              description: The numeric code representing the user's account state.
              example: 20
            value:
              type: string
              description: The human-readable label of the user's account state (e.g. Active, Inactive).
              example: Active
            _id:
              type: string
              description: The unique identifier of the state record.
              example: aabbccddeeff001122334455
        organizationalAccount:
          type: boolean
          description: Whether this user is an organizational (admin-level) account rather than a regular user.
          example: true
        receiveReturnEmails:
          type: boolean
          description: Whether the user is configured to receive email notifications for return shipments.
          example: false
        receivePickupEmails:
          type: boolean
          description: Whether the user is configured to receive email notifications for pickup requests.
          example: false
      example:
        _id: aBcDeFgHiJkLmNoPqRsTu
        emails:
          - address: user@example.com
            verified: true
        profile:
          firstName: John
          lastName: Doe
          phone: '+201000000000'
        group:
          _id: XaqlCFA
          name: BUSINESS_FULL_ACCESS
          code: 115
        state:
          code: 20
          value: Active
          _id: aabbccddeeff001122334455
        organizationalAccount: true
        receiveReturnEmails: false
        receivePickupEmails: false

