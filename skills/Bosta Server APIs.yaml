    CreateBusinessRequest:
      title: CreateBusinessRequest
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: The business display name.
        arabicName:
          type: string
          description: The business display name in Arabic.
        website:
          type: string
          description: The business website URL.
        salesChannel:
          type: array
          description: The sales channels through which the business operates (e.g. INSTAGRAM_SELLER).
          items:
            type: string
        monthlyShipmentVolume:
          type: string
          description: >
            The expected monthly shipment volume tier. PRO tiers are for
            Pro-tier businesses; LITE tiers are for Lite/SOHO-tier businesses.
            Higher numbers indicate higher volumes.
          enum: [PRO_1, PRO_2, PRO_3, LITE_1, LITE_2, LITE_3]
        isBankInfoSkipped:
          type: boolean
          description: Whether the business chose to skip providing bank information during onboarding.
        isLegalInfoSkipped:
          type: boolean
          description: Whether the business chose to skip providing legal information during onboarding.
        businessLegalInfo:
          type: object
          description: Legal and compliance information for the business.
          required:
            - haveCommercialId
          properties:
            haveCommercialId:
              type: boolean
              description: Whether the business has a commercial registration ID.
            legalBusinessName:
              type: string
              description: The official registered legal name of the business.
            identityNumber:
              type: string
              description: Owner's national identity number.
            birthDate:
              type: string
              format: date
              description: Owner's date of birth.
            freelanceCertificateNumber:
              type: string
              description: Freelance certificate number, for sole proprietors.
            commercialRegisterNumber:
              type: string
              description: Commercial register number issued by the relevant authority.
            vatId:
              type: string
              description: VAT registration ID.
            businessNationalIdNumber:
              type: string
              description: Business owner's national ID number.
            businessTaxRegNumber:
              type: string
              description: Tax registration number.
        industry:
          type: string
          description: The industry or sector the business operates in.
        refLink:
          type: string
          description: Referral link associated with the business registration.
        campaign:
          type: string
          description: Marketing campaign name associated with the business registration.
        channel:
          type: string
          description: Marketing channel through which the business registered (e.g. Facebook, Google).
        promoCode:
          type: string
          description: Promotional code applied at registration.
        autoCreatePickups:
          type: boolean
          description: When true, pickup requests are automatically created whenever new orders are placed.
        marketPlaceRole:
          type: string
          description: >
            The role of this business in a marketplace setup.
            AGGREGATOR manages vendors; VENDOR is a seller under an aggregator;
            NONE means the business is not part of a marketplace.
          enum: [AGGREGATOR, VENDOR, NONE]

      example:
        name: My Business
        arabicName: عملي
        website: https://www.mybusiness.com
        salesChannel:
          - INSTAGRAM_SELLER
          - WEBSITE
        monthlyShipmentVolume: PRO_2
        isBankInfoSkipped: false
        isLegalInfoSkipped: false
        businessLegalInfo:
          haveCommercialId: true
          legalBusinessName: My Business LLC
          identityNumber: '29001011234567'
          birthDate: '1990-01-01'
          commercialRegisterNumber: '12345678'
          vatId: 'VAT123456'
          businessNationalIdNumber: '12345678901234'
          businessTaxRegNumber: '123456789'
        industry: E-Commerce
        refLink: https://ref.bosta.co/mybusiness
        campaign: spring_sale
        channel: organic
        promoCode: BOSTA10
        autoCreatePickups: true
        marketPlaceRole: NONE

    InviteUserRequest:
      type: object
      required:
        - email
        - name
      # one of groupId or groupBaseCodes must be present
      oneOf:
        - required: [groupId]
          properties:
            groupId:
              type: string
              description: >
                The ID of a predefined access group to assign to the invited user.
                Each group grants a fixed, named set of permissions with no further customisation.
                Available groups:

                  - `XaqlCD`    **Default Access** - Read-only access to shipments, pickup requests, and
                    basic business profile information. Suitable for team members who only need
                    visibility without making changes.

                  - `XaqlCT`    **Tech Access** – Everything in Default Access plus the ability to manage
                    API keys and configure integrations (webhooks, plugins, third-party platforms).
                    Intended for developers and technical staff.

                  - `XaylCTM`   **Team Management Access** – Everything in Default Access plus the ability
                    to invite, remove, and update the roles of other team members.
                    Intended for team leads or office managers.

                  - `XbOlCTM`   **Tech + Team Management Access** – Combines Tech and Team Management.

                  - `XaqmCW`    **Wallet Access** – Provides access to payout methods, wallet balance, and
                    transaction history. Does not include shipment or team management capabilities.
                    Intended for finance staff who only handle payments.

                  - `XbFlCWT`   **Wallet + Tech Access** – Combines Wallet and Tech.

                  - `XbJlCWTM`  **Wallet + Team Management Access** – Combines Wallet and Team Management.

                  - `XbclCWTMT` **Wallet + Tech + Team Management Access** – Combines Wallet, Tech, and Team Management.

                  - `XaqlCF`    **Finance Access** – Access to financial reports, invoices, and transaction
                    records. Broader financial visibility than Wallet Access alone.

                  - `XbDlCFT`   **Finance + Tech Access** – Combines Finance and Tech.

                  - `XbElCFTT`  **Finance + Team Management Access** – Combines Finance and Team Management.

                  - `XbclCFW`   **Finance + Wallet Access** – Combines Finance and Wallet.

                  - `XbclCFWT`  **Finance + Wallet + Tech Access** – Combines Finance, Wallet, and Tech.

                  - `XbclCFTMT` **Finance + Tech + Team Management Access** – Combines Finance, Tech, and Team Management.

                  - `XbclCFWTM` **Finance + Wallet + Team Management Access** – Combines Finance, Wallet, and Team Management.

                  - `XaqlCFA`   **Full Access** – Unrestricted access to all business features including
                    shipments, team management, API integrations, wallet, finance, and settings.
                    Reserved for business owners or senior administrators.

                  - `ZaqlCD` **Editor Default Access**

                  - `ZaqlCT` **Editor Tech Access**
                  
                  - `ZaylCTM` **Editor Team Management Access**

                  - `ZbOlCTM` **Editor Tech + Team Management Access**

                  - `ZaqmCW` **Editor Wallet Access**
              enum:
                - XaqlCD
                - XaqlCT
                - XaylCTM
                - XbOlCTM
                - XaqmCW
                - XbFlCWT
                - XbJlCWTM
                - XbclCWTMT
                - XaqlCF
                - XbDlCFT
                - XbElCFTT
                - XbclCFW
                - XbclCFWT
                - XbclCFTMT
                - XbclCFWTM
                - XaqlCFA
                - ZaqlCD
                - ZaqlCT
                - ZaylCTM
                - ZbOlCTM
                - ZaqmCW
              example: XaqlCFA
        - required: [groupBaseCodes]
          properties:
            groupBaseCodes:
              type: array
              description: >
                An array of at least 2 permission module codes used to dynamically resolve
                a composite access group. The system looks up the group whose permission
                set is the exact union of the provided module codes.

                Use this field instead of `groupId` when you want to describe the desired
                permissions by their constituent modules rather than by a fixed group ID.

                **Available permission module codes** (provide at least 2):

                  - `101` **Tech** – API key management and third-party integration configuration.
                  - `102` **Team Management** – Invite, remove, and update roles of team members.
                  - `104` **Wallet** – View payout methods, wallet balance, and transactions.
                  - `108` **Finance** – Access financial reports, invoices, and billing records.

                **Supported combinations:**

                  - `[101, 102]`       Tech + Team Management
                  - `[101, 104]`       Tech + Wallet
                  - `[102, 104]`       Team Management + Wallet
                  - `[101, 102, 104]`  Tech + Team Management + Wallet
                  - `[101, 108]`       Tech + Finance
                  - `[102, 108]`       Team Management + Finance
                  - `[104, 108]`       Wallet + Finance
                  - `[101, 104, 108]`  Tech + Wallet + Finance
                  - `[101, 102, 108]`  Tech + Team Management + Finance
                  - `[102, 104, 108]`  Team Management + Wallet + Finance
              minItems: 2
              items:
                type: integer
                enum: [101, 102, 104, 108]
              example: [101, 102]

