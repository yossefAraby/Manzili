          email: test
          phone: test
        address:
          firstLine: el-mohandseen
          floor: '1'
          apartment: '1'
          city:
            _id: FceDyHXwpSYYF9zGW
            name: cairo
          district: cairo
    UpdatepickupLocationRequest:
      title: UpdatepickupLocationRequest
      required:
        - locationName
        - contactPerson
        - address
        - contacts
      type: object
      properties:
        locationName:
          type: string
        contactPerson:
          $ref: '#/components/schemas/ContactPerson'
        contacts:
          $ref: '#/components/schemas/Contacts'
        address:
          $ref: '#/components/schemas/AddressCreatePickUpLocation'
      example:
        locationName: business101
        contactPerson:
          name: test
          email: test
          phone: test
        address:
          firstLine: el-mohandseen
          floor: '1'
          apartment: '1'
          city:
            _id: FceDyHXwpSYYF9zGW
            name: cairo
          district: cairo
    Address1:
      title: Address1
      required:
        - firstLine
        - floor
        - apartment
        - city
        - district
      type: object
      properties:
        firstLine:
          type: string
        floor:
          type: string
        apartment:
          type: string
        city:
          $ref: '#/components/schemas/City'
        district:
          type: string
      example:
        firstLine: el-mohandseen
        floor: '1'
        apartment: '1'
        city:
          _id: FceDyHXwpSYYF9zGW
          name: cairo
        district: cairo
    GroupsCreate:
