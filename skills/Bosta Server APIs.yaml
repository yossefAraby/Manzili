  /products/list:
    post:
      tags:
        - Products
      summary: List Business Products
      description: >
        Returns a paginated, filterable, and sortable list of products belonging
        to the authenticated business admin.
      operationId: listBusinessProducts
      security:
        - Bearer: []
        - ApiKey: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListBusinessProductsRequest'
            examples:
              defaultRequest:
                summary: Default – no filters, first page
                value:
                  page: 1
                  limit: 20
              searchRequest:
                summary: Full-text search with pagination
                value:
                  searchText: blue t-shirt
                  page: 1
                  limit: 10
              filterActiveWithSort:
                summary: Active products sorted by creation date descending
                value:
