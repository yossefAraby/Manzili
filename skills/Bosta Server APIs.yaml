          description: Ok
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Your phone number has been changed successfully.
                  data:
                    nullable: true
                    example: null
        '400':
          description: Bad request
        '401':
          description: UnAuthorized
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: User is not authorized!
                errorCode: 1007
                data: null
        '403':
          description: Forbidden
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Access to the requested resource is forbidden
                errorCode: 1008
                data: null
        '500':
          description: Internal Server Error
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Internal Server Error
