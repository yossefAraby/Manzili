        fawryPhone: '01123456709'
        phone: '01123456709'
      type: object
      properties:
        phone:
          type: string
        fawryPhone:
          type: string
    BusinessconfirmphoneRequest:
      title: BusinessconfirmphoneRequest
      example:
        phone: '01123456709'
        token: '6743'
        isFawry: false
      type: object
      properties:
        phone:
          type: string
        token:
