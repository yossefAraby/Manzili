openapi: 3.0.1
info:
  version: 2.0.0
  title: Bosta Server APIs
  description: Documentations for Bosta APIs
  contact:
    name: Bosta Team
    url: https://bosta.co
    email: gaber@bosta.co
servers:
  - url: http://app.bosta.co/api/v2/
tags:
  - name: Users
    description: All Users APIs
  - name: Groups
    description: All system groups APIs
  - name: Businesses
    description: All businesses APIs
  - name: Pickup locations
    description: 'All pickup locations '
components:
  securitySchemes:
    Bearer:
      type: http
      scheme: bearer
    ApiKey:
      type: apiKey
      name: Authorization
      in: header
  schemas:
    Address:
      title: Address
      required:
        - firstLine
        - secondLine
        - floor
        - apartment
        - city
      type: object
      properties:
        firstLine:
          type: string
        secondLine:
          type: string
        floor:
          type: string
        apartment:
          type: string
        city:
          $ref: '#/components/schemas/City'
      example:
        firstLine: el-mohandseen
        secondLine: el-mohandseen
        floor: '1'
        apartment: '1'
        city:
          _id: FceDyHXwpSYYF9zGW
          name: cairo
    City:
      title: City
      required:
        - _id
        - name
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
      example:
        _id: FceDyHXwpSYYF9zGW
        name: cairo
    PaymentInfo:
      title: PaymentInfo
      required:
        - paymentFrequency
        - paymentSchedule
        - paymentTransferMethod
        - paymentWay
        - businessCategory
      type: object
      properties:
        paymentFrequency:
          type: string
        paymentSchedule:
          type: string
        paymentTransferMethod:
          type: string
        paymentWay:
          type: string
        businessCategory:
          type: string
      example:
        paymentFrequency: Weekly
        paymentSchedule: Sunday
        paymentTransferMethod: Cash
        paymentWay: Net COD
        businessCategory: Bronze
    countryId:
      type: string
      description: Egypt countryId is `60e4482c7cb7d4bc4849c4d5` and KSA countryId is `eF-3f9FZr`
      enum:
        - 60e4482c7cb7d4bc4849c4d5
        - eF-3f9FZr
    BankInfo:
      title: BankInfo
      required:
        - beneficiaryName
        - accountNumber
        - bankName
      type: object
      properties:
        beneficiaryName:
          type: string
        accountNumber:
          type: string
        bankName:
          type: string
      example:
        beneficiaryName: test
        accountNumber: '123'
        bankName: cib
    PickupAddress:
      title: PickupAddress
      required:
        - firstLine
        - secondLine
        - floor
        - apartment
        - city
        - district
        - buildingType
      type: object
      properties:
        firstLine:
          type: string
        secondLine:
          type: string
        floor:
          type: string
        apartment:
          type: string
        city:
          $ref: '#/components/schemas/City'
        district:
          type: string
        buildingType:
          type: integer
          format: int32
      example:
        firstLine: el-mohandseen
        secondLine: el-mohandseen
        floor: '1'
        apartment: '1'
        city:
          _id: FceDyHXwpSYYF9zGW
          name: cairo
        district: Abu Rawash
        buildingType: 0
    BusinessUpdatedData:
      title: BusinessUpdatedData
      required:
        - name
        - website
        - salesChannel
        - industry
      type: object
      properties:
        name:
          type: string
        arabicName:
          type: string
        website:
          type: string
        salesChannel:
          type: string
        industry:
          type: string
      example:
        name: business101
        website: www.google.com
        salesChannel: INSTAGRAM_SELLER
        industry: industry
    BusinessaddpinCodeRequest:
      title: BusinessaddpinCodeRequest
      required:
        - masterPinCode
      type: object
      properties:
        masterPinCode:
          type: string
      example:
        masterPinCode: '123456'
    BusinesspinCoderesetRequest:
      title: BusinesspinCoderesetRequest
      required:
        - token
        - masterPinCode
      type: object
      properties:
        token:
          type: string
        masterPinCode:
          type: string
      example:
        token: '123456'
        masterPinCode: '123456'
    BusinesspinCodeverifyRequest:
      title: BusinesspinCodeverifyRequest
      required:
        - masterPinCode
      type: object
      properties:
        masterPinCode:
          type: string
      example:
        masterPinCode: '123456'
    BusinessemailchangeRequest:
      title: BusinessemailchangeRequest
      required:
        - newEmail
      type: object
      properties:
        newEmail:
          type: string
      example:
        newEmail: test@yahoo.com
    BusinessupdateRequest:
      title: BusinessupdateRequest
      type: object
      properties:
        name:
          type: string
        vehicle:
          type: string
        phone:
          type: array
          items:
            type: string
          description: ''
        fawryPhone:
          type: string
        desc:
          type: string
        estimatedWeeklyDeliveries:
          type: string
        website:
          type: string
        type:
          type: string
        logo:
          type: string
        address:
          type: array
          items:
            $ref: '#/components/schemas/Address'
          description: ''
        paymentInfo:
          $ref: '#/components/schemas/PaymentInfo'
        bankInfo:
          $ref: '#/components/schemas/BankInfo'
        priceListId:
          type: string
        pickupAddress:
          type: array
          items:
            $ref: '#/components/schemas/PickupAddress'
          description: ''
        businessUpdatedData:
          $ref: '#/components/schemas/BusinessUpdatedData'
      example:
        name: business101
        vehicle: Car
        phone:
          - '+201003456789'
        fawryPhone: '+201003456789'
        desc: business 101 desc
        estimatedWeeklyDeliveries: 1 - 10
        website: www.google.com
        type: RETAIL_AND_SHOPPING
        logo: www.google.com
        address:
          - firstLine: el-mohandseen
            secondLine: el-mohandseen
            floor: '1'
            apartment: '1'
            city:
              _id: FceDyHXwpSYYF9zGW
              name: cairo
        paymentInfo:
          paymentFrequency: Weekly
          paymentSchedule: Sunday
          paymentTransferMethod: Cash
          paymentWay: Net COD
          businessCategory: Bronze
        bankInfo:
          beneficiaryName: test
          accountNumber: '123'
          bankName: cib
        priceListId: ''
        pickupAddress:
          - firstLine: el-mohandseen
            secondLine: el-mohandseen
            floor: '1'
            apartment: '1'
            city:
              _id: FceDyHXwpSYYF9zGW
              name: cairo
            district: Abu Rawash
            buildingType: 0
        businessUpdatedData:
          name: business101
          website: www.google.com
          salesChannel: INSTAGRAM_SELLER
          industry: industry
    BusinessemailverifyRequest:
      title: BusinessemailverifyRequest
      required:
        - verificationToken
      type: object
      properties:
        verificationToken:
          type: string
      example:
        verificationToken: '12345'
    BusinessupdatephoneRequest:
      title: BusinessupdatephoneRequest
      required:
        - phone
      type: object
      properties:
        phone:
          type: string
          description: The new phone number to update for the business. Must be a valid phone number format.
          example: '01038594038'
      example:
