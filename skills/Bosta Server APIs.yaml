                - asc
                - desc
            minPrice:
              type: string
              enum:
                - asc
                - desc
      example:
        sortedBy:
          name: asc

    SortedByField:
      type: string
      enum:
        - asc
        - desc
      description: Sort direction for the field
      example: desc

    SortedBy:
      type: object
      description: >
        One or more sort criteria applied to the product list.
        At least one key must be provided when this object is included.
      minProperties: 1
      properties:
        name:
          allOf:
            - $ref: '#/components/schemas/SortedByField'
          description: Sort by product name
        createdAt:
          allOf:
            - $ref: '#/components/schemas/SortedByField'
          description: Sort by product creation date
        productOrder:
          allOf:
            - $ref: '#/components/schemas/SortedByField'
          description: Sort by the custom product display order
        categoryName:
          allOf:
            - $ref: '#/components/schemas/SortedByField'
          description: Sort by category name
        isActive:
          allOf:
            - $ref: '#/components/schemas/SortedByField'
          description: Sort by active status
        orderedCount:
          allOf:
            - $ref: '#/components/schemas/SortedByField'
          description: Sort by the number of times the product has been ordered
        quantity:
          allOf:
            - $ref: '#/components/schemas/SortedByField'
          description: Sort by total available quantity
        minPrice:
          allOf:
            - $ref: '#/components/schemas/SortedByField'
          description: Sort by minimum variant price
      example:
        createdAt: desc

    ListBusinessProductsRequest:
      type: object
      description: >
        All fields are optional. When the body is omitted entirely, all products
        are returned ordered by custom product order ascending.
      properties:
        page:
          type: integer
          minimum: 1
          description: Page number for pagination. Must be used together with `limit`.
          example: 1
        limit:
          type: integer
          minimum: 1
          description: Number of products per page. Must be used together with `page`.
          example: 20
        searchText:
          type: string
          description: >
            Free-text search query. When provided, all other filters except `isActive` /
            `isActiveProducts` are ignored.
          example: blue t-shirt
        isActive:
          type: boolean
          description: >
            Filter products by their active status. `true` returns only active
            products, `false` returns only inactive products. When omitted,
            both are returned.
          example: true
        isActiveProducts:
          type: boolean
          description: >
            Alias filter for `isActive`.
            Typically mirrors `isActive`.
          example: true
        isActiveProductVariants:
          type: boolean
          description: Filter the included product variants by their active status.
          example: true
        productsIds:
          type: array
          items:
            type: integer
          description: >
            Restrict the result set to products with these specific ids.
            When omitted, all products of the business are considered.
          example:
            - 101
            - 202
            - 303
        inactiveInventoryPreview:
          type: boolean
          description: >
            When `true`, returns products that are either fully inactive or have
            some inactive variants (partial availability).
            Cannot be combined with `isActive`.
          example: false
        lowStock:
          type: boolean
          description: >
            When `true`, returns only products whose quantity is below the
            business-configured low-stock threshold (defaults to a system
            constant when not configured).
          example: false
        updateProductCustomSorting:
          type: boolean
          description: >
            When `true`, persists the supplied `sortedBy` as the business's
            preferred product sort order for future requests.
          example: false
        sortedBy:
          $ref: '#/components/schemas/SortedBy'
        oldSortedBy:
          type: string
          deprecated: true
          description: >
            Legacy comma-separated sort string (e.g. `"-createdAt,name"`).
            Prefix a field with `-` for descending order.
            Superseded by the structured `sortedBy` object.
          example: '-createdAt,name'

    ProductVariant:
      type: object
      description: A single product variant (SKU) belonging to a product.
      properties:
        id:
          type: integer
          description: Variant unique identifier
          example: 501
        productId:
          type: integer
          description: Id of the parent product
          example: 101
        optionsString:
          type: string
          description: >
            Human-readable representation of the variant's option values
            (e.g. "Size: M | Color: White")
          example: 'Size: M | Color: White'
        referenceId:
          type: string
          nullable: true
          description: Merchant-assigned SKU reference code
          example: SKU-WHITE-TEE-M
        variantPrice:
          type: number
          format: float
          description: Current selling price of the variant
          example: 199.99
        variantOriginalPrice:
          type: number
          format: float
          nullable: true
          description: Original (pre-discount) price of the variant
          example: 249.99
        variantDefaultImage:
          type: string
          format: uri
          nullable: true
          description: URL of the variant's default display image
          example: https://cdn.example.com/images/product-101-m.jpg
        variantQuantity:
          type: integer
          description: Available stock quantity for this variant
          example: 20
        reservedQuantity:
          type: integer
          description: Quantity reserved by pending orders
          example: 1
        isActive:
          type: boolean
          description: Whether the variant is currently active and available for purchase
          example: true
        defaultCreated:
          type: boolean
          description: >
            `true` for the automatically created default variant of a
            single-variant product
          example: true

    ProductCategory:
      type: object
      nullable: true
      description: >
        Category and sub-category the product belongs to.
        `null` when the product has no category.
      properties:
        categoryId:
          type: string
          description: Category identifier (MongoDB ObjectId)
          example: cat-apparel-01
        categoryName:
          type: string
          description: Category display name in English
          example: Apparel
        categoryNameAr:
          type: string
          description: Category display name in Arabic
          example: ملابس
        subCategoryName:
          type: string
          nullable: true
          description: Sub-category display name in English
          example: T-Shirts
        subCategoryNameAr:
          type: string
          nullable: true
          description: Sub-category display name in Arabic
          example: تيشيرتات

    ProductSizeChart:
      type: object
      nullable: true
      description: Size chart linked to the product. `null` when none is assigned.
      properties:
        id:
          type: integer
          description: Size chart identifier
          example: 7
        title:
          type: string
          description: Size chart title in English
          example: T-Shirt Size Guide
        titleAr:
          type: string
          description: Size chart title in Arabic
          example: دليل مقاسات التيشيرت

    Product:
      type: object
      description: A single business product with its variants.
      properties:
        id:
          type: integer
          description: Product unique identifier
          example: 101
        name:
          type: string
          description: Product name in English
          example: Classic White T-Shirt
        nameAr:
          type: string
          nullable: true
          description: Product name in Arabic
          example: تيشيرت أبيض كلاسيكي
        description:
          type: string
          nullable: true
          description: Product description in English
          example: 100% cotton crew-neck t-shirt
        descriptionAr:
          type: string
          nullable: true
          description: Product description in Arabic
          example: تيشيرت بياقة مستديرة من القطن الخالص
        defaultImage:
          type: string
          format: uri
          nullable: true
          description: URL of the product's primary display image
          example: https://cdn.example.com/images/product-101.jpg
        defaultPrice:
          type: number
          format: float
          description: Default selling price (taken from the default variant)
          example: 199.99
        originalPrice:
          type: number
          format: float
          nullable: true
          description: Original price before any discount
          example: 249.99
        showDiscounts:
          type: boolean
          description: Whether to display the crossed-out original price on the storefront
          example: true
        quantity:
          type: integer
          description: Total available quantity across all variants
          example: 50
        reservedQuantity:
          type: integer
          description: Total quantity reserved by in-progress orders
          example: 3
        isActive:
          type: boolean
          description: Whether the product is currently active and visible on the storefront
          example: true
        isTrending:
          type: boolean
          description: Whether the product is marked as trending
          example: false
        referenceId:
          type: string
          nullable: true
          description: Merchant-assigned product reference / SKU code
          example: SKU-WHITE-TEE-001
        locationName:
          type: string
          nullable: true
          description: Storage location label (e.g. warehouse name)
          example: Main Warehouse
        defaultCreatedVarianceId:
          type: integer
          nullable: true
          description: Id of the automatically created default variant
          example: 501
        itemValue:
          type: number
          format: float
          nullable: true
          description: Declared customs / insurance value of the item
          example: 180.0
        sizeChartId:
          type: integer
          nullable: true
          description: Id of the linked size chart, if any
          example: 7
        # sizeChart:
        #   $ref: '#/components/schemas/ProductSizeChart'
        category:
          $ref: '#/components/schemas/ProductCategory'
        productsVariances:
          type: array
          description: List of variants belonging to this product
          items:
            $ref: '#/components/schemas/ProductVariant'

    ListBusinessProductsData:
      type: object
      properties:
        hiddenProductsCount:
          type: integer
          description: >
            Number of active products hidden from the storefront because their
            quantity is zero and the business has disabled out-of-stock display.
          example: 2
        variancesCount:
          type: integer
          description: >
            Total number of variants matching the applied filters
            (before pagination).
          example: 15
        productCount:
          type: integer
          description: >
            Total number of products matching the applied filters
            (before pagination).
          example: 5
        products:
          type: array
          description: Paginated list of products for the current page.
          items:
            $ref: '#/components/schemas/Product'

    ListBusinessProductsResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Done Successfully
        data:
          $ref: '#/components/schemas/ListBusinessProductsData'

  responses:
    UnauthorizedResponse:
      description: Unauthorized - Invalid authorization token or API key.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UnauthorizedResponse'

    InternalServerErrorResponse:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/InternalServerErrorResponse'

    BadRequestResponse:
      description: Bad Request - The request is invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestResponse'

    ForbiddenResponse:
      description: Forbidden - Access to the requested resource is forbidden.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ForbiddenResponse'

security:
  - Bearer: []
paths:
  /users/login:
    post:
      security: []
      tags:
        - Users
      summary: Login
      description: |
        Authenticates a user using email and password.
  
        - If the user **does NOT have Two-Factor Authentication (2FA) enabled**, the login works using only `email` and `password`.
        - If the user **has 2FA enabled**, the request must also include a valid `otp` (One-Time Password).
        
        For details on logging in with 2FA, see: [How to login using 2FA](https://docs.bosta.co/docs/how-to/login-using-2fa).
      operationId: Login
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: super-admin@bosta.co
              password: 1234ABcd@
              otp : 239080
      responses:
        '200':
          description: Ok
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Done successfully.
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: access token
                        example: Bearer <TOKEN>
                      refreshToken:
                        type: string
                        description: refresh token
                        example: <REFRESH_TOKEN>
                      user:
                        type: object
                        properties:
                          _id:
                            type: string
                            example: mczccXIx-
                          emails:
                            type: array
                            items:
                              type: object
                              properties:
                                verified:
                                  type: boolean
                                  example: true
                                address:
                                  type: string
                                  example: super-admin@bosta.co
                          profile:
                            type: object
                            properties:
                              firstName:
                                type: string
                                example: Bosta
                              lastName:
                                type: string
                                example: Bronze
                              phone:
                                type: string
                                example: "01038594038"
                          roles:
                            type: array
                            items:
                              type: string
                            example:
                              - SUPER_ADMIN
                          isPhoneVerified:
                            type: boolean
                            example: false
                          isFirstOrderCreated:
                            type: boolean
                            example: false
                          businessAdminInfo:
                            type: object
                            properties:
                              businessId:
                                type: string
                                example: iMBIEJg9j
                              businessName:
                                type: string
                                example: Bosta Bronze+1
        '400':
          description: Bad request
        '401':
          description: UnAuthorized
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: User is not authorized!
                errorCode: 1007
                data: null
        '403':
          description: Forbidden
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Access to the requested resource is forbidden
                errorCode: 1008
                data: null
        '500':
          description: Internal Server Error
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Internal Server Error
                errorCode: 1000
                data: null
      deprecated: false
  /users/accept-invitation:
    get:
      tags:
        - Users
      summary: Accept invitation
      description: |
        This endpoint validates the invitation link sent to a user's email.
        It checks whether the invitation token and email are valid before allowing
        the user to proceed with account creation.
  
        Typically used when the user clicks the invitation link in their email.
      operationId: accept-invitation
      parameters:
        - in: query
          name: email
          required: true
          description: The email address that received the invitation.
          schema:
            type: string
            format: email
        - in: query
          name: invitationToken
          required: true
          description: Unique numeric token included in the invitation link.
          schema:
            type: string
      responses:
        '200':
          description: Ok
          headers: {}
          content:
            application/json:
              schema :
                type: object
                properties:
                  success:
                    type: boolean
                    description: Indicates whether the password reset request was processed successfully.
                    example: true
                  message:
                    type: string
                    description: Informational message returned after processing the request.
                    example: Done successfully.
                  data:
                    nullable: true
                    description: No additional data is returned for this operation.
                    example: null
        '400':
          description: Bad request
        '401':
          description: UnAuthorized
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: User is not authorized!
                errorCode: 1007
                data: null
        '403':
          description: Forbidden
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Access to the requested resource is forbidden
                errorCode: 1008
                data: null
        '500':
          description: Internal Server Error
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Internal Server Error
                errorCode: 1000
                data: null
      security : []
      deprecated: false
    post:
      tags:
        - Users
      summary: Accept invitation and create user account
      description: |
        Completes the invitation process by creating a new user account
        associated with the invited business.
  
        The user must provide:
        - The **invitation token**
        - The **invited email**
        - A **secure password**
        - Basic **profile information**
  
        If the invitation is valid, the user will be created and authenticated,
        and the API will return **access and refresh tokens**.

      operationId: accept-invitation-join-business-user
      parameters: []
      requestBody:
        description: |
          Payload required to complete the invitation and create the user account.
  
          **Password Requirements:**
          - Minimum 8 characters
          - At least one uppercase letter
          - At least one lowercase letter
          - At least one number
          - At least one special character
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinBusinessUser'
            example:
              invitationToken: 9025
              email: user@yahoo.com
              password: ABab12#qwe
              profile:
                firstName: User
                lastName: User
                phone: "01028364738"

      responses:
        '200':
          description: |
            Invitation accepted successfully.
  
            The response includes authentication tokens and the created user data.
          content:
            application/json:
              example:
                success: true
                message: Done successfully.
                data:
                  token: Bearer <TOKEN>
                  refreshToken: <REFRESH_TOKEN>
                  user:
                    _id: mczccXIx-
                    emails:
                      - verified: false
                        address: super-admin@bosta.co
                    profile:
                      firstName: Bosta
                      lastName: Bronze
                      phone: "01038594038"
                    roles:
                      - SUPER_ADMIN
                    isPhoneVerified: false
                    isFirstOrderCreated: false
                    businessAdminInfo:
                      businessId: iMBIEJg9j
                      businessName: Bosta Bronze+1
        '400':
          description: Bad request
        '401':
          description: UnAuthorized
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: User is not authorized!
                errorCode: 1007
                data: null
        '403':
          description: Forbidden
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Access to the requested resource is forbidden
                errorCode: 1008
                data: null
        '500':
          description: Internal Server Error
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Internal Server Error
                errorCode: 1000
                data: null
      security: []
      deprecated: false
