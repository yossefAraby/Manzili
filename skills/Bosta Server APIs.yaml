  /users/generate-personal-otp:
    post:
      tags:
        - Users
      summary: Business user generate personal info otp
      description: |
        Generates an OTP to verify the business user's phone number or email before updating the business information.
      operationId: generatePersonalInfoOtp
      parameters: []
      requestBody:
        description: |
          This endpoint supports two operations depending on the request body.

          ### 1. Generate OTP
          Send the request **without a body** to generate an OTP.
          The OTP will be sent to the business user's registered phone number.

          ### 2. Update Personal Information
          Send the request with **either `phone` or `email`** in the body to update the user's personal information.

          **Rules:**
          - OTP must be generated first.
          - Only one field can be updated per request.
          - Either `phone` or `email` is allowed, but not both.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GeneratePersonalInfoOTP'
            examples:
              changePhone:
                summary: Update phone number
                value:
                  phone: "+20001111111"
              changeEmail:
                summary: Update email
                value:
                  email: "test@gmail.com"
      responses:
        '200':
          description: Ok
          headers: {}
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: You shall receive the confirmation code to your new email within 2 minutes.
                  data:
                    nullable: true
                    example: null
        '400':
          description: Bad request
        '401':
          description: UnAuthorized
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: User is not authorized!
                errorCode: 1007
                data: null
        '403':
          description: Forbidden
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Access to the requested resource is forbidden
                errorCode: 1008
                data: null
        '500':
          description: Internal Server Error
          headers: {}
          content:
            application/json:
              example:
                success: false
                message: Internal Server Error
                errorCode: 1000
                data: null
      security:
        - Bearer: []
      deprecated: false
  /users/confirm-personal-otp:
    post:
      tags:
        - Users
      summary: Business user confirm personal info otp
      description: |
        Confirms the OTPs required to update the business user's phone number or email.
      operationId: confirmPersonalInfoOtp
      parameters: []
      requestBody:
        description: |
          OTP tokens used to confirm updating personal information.

          - **personalInfoOtp**: OTP sent to the registered phone to authorize personal info update.
          - **phoneUpdateOtp**: OTP sent to the new phone number.
