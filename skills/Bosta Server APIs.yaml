        - Deliveries
      summary: Print Air Waybill
      operationId: printMassAwb
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - trackingNumbers
                - requestedAwbType
                - lang
              properties:
                trackingNumbers:
                  type: string
                  description: Comma separated list of tracking numbers
                  example: '77873113,77873114'
                requestedAwbType:
                  type: string
                  description: The requested AWB paper size
                  enum:
                    - A6
                    - A4
                  example: 'A4'
                lang:
                  type: string
                  description: Language of the AWB
                  enum:
                    - ar
                    - en
                  example: 'ar'
            example:
              trackingNumbers: '77873113,77873114'
              requestedAwbType: 'A4'
              lang: 'ar'
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '401':
          description: UnAuthorized
        '500':
          description: Server Error
  /pricing/calculator:
    get:
      tags:
        - Pricing
      summary: Get Pricing Plan
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '401':
          description: UnAuthorized
        '403':
          description: Forbidden
        '500':
          description: Server Error
      security:
        - Bearer: []
      parameters:
        - in: query
          name: tierIdSelector
          required: true
          schema:
            type: string
            enum:
              - c__CT4DU9I
              - yiqKg_aGM1
            description: 'The tierIdSelector should be one of the following `c__CT4DU9I` for the `Basic` plan or `yiqKg_aGM1` for the `Business` plan'
        - in: query
          name: pickupSectorId
          required: true
          schema:
            type: number
            example: '1: Cairo & Giza // 2: Alexandria & Behira // 3: Delta & Canal // 4: Near Upper // 5: Far Upper & Matrouh // 6: North Coast // 7: Sinai & New Valley'
          description: The pickup sector id
        - in: query
          name: dropoffSectorId
          required: false
          schema:
            type: number
            example: '1: Cairo & Giza // 2: Alexandria & Behira // 3: Delta & Canal // 4: Near Upper // 5: Far Upper & Matrouh // 6: North Coast // 7: Sinai & New Valley'
          description: The dropOff sector id
        - in: query
          name: type
          required: false
          schema:
            type: string
            example: SEND
          description: 'The delivery type, please select the types from:  [SEND, CASH_COLLECTION, RTO, CUSTOMER_RETURN_PICKUP, EXCHANGE, INTERNATIONAL, SIGN_AND_RETURN], you may send one type or several types'
        - in: query
          name: vatIncluded
          required: false
          schema:
            type: boolean
            default: false
            example: true
          description: Is VAT included in the calculation or not
  /pricing/shipment/calculator:
    get:
      tags:
        - Pricing
      summary: Get Shipping fees estimate
      responses:
        '200':
          description: OK
        '400':
          description: Bad Request
        '401':
          description: UnAuthorized
        '403':
          description: Forbidden
        '500':
          description: Server Error
      security:
        - Bearer: []
      parameters:
        - in: query
          name: dropOffCity
          required: false
          schema:
            type: string
            example: 'Cairo'
            description: 'The city where the order will be delivered, for example `Cairo`'
        - in: query
          name: pickupCity
          required: false
          schema:
            type: string
            example: 'Cairo'
          description: The city where the order will be picked up, for example `Cairo`
        - in: query
          name: cod
          required: false
          schema:
            type: number
            example: 100
          description: The order Cash on Delivery amount
        - in: query
          name: type
          required: false
          schema:
            type: string
            enum:
              - SEND
              - CASH_COLLECTION
              - CUSTOMER_RETURN_PICKUP
              - EXCHANGE
              - SIGN_AND_RETURN
          description: 'The delivery type, please select the types from:  [SEND, CASH_COLLECTION, CUSTOMER_RETURN_PICKUP, EXCHANGE, SIGN_AND_RETURN].'
        - in: query
          name: size
          required: false
          schema:
            type: string
            enum:
              - Normal
              - Light Bulky
              - Heavy Bulky
          description: 'the delivery size, please select the size from: [`Normal`, `Light Bulky`, `Heavy Bulky`]'
